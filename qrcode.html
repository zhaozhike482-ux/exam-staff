<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>监考人员信息维护器 - 扫码访问</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#333}
.card{background:white;border-radius:20px;padding:36px 32px;max-width:380px;width:90vw;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
.icon{font-size:40px;margin-bottom:8px}
.title{font-size:18px;font-weight:600;color:#1677ff;margin-bottom:4px}
.subtitle{font-size:13px;color:#999;margin-bottom:24px}
#qrcode{display:flex;justify-content:center;margin-bottom:20px}
#qrcode img,#qrcode canvas{border-radius:12px;border:3px solid #e8e8e8}
.url-box{background:#f5f7fa;border:1px solid #e8e8e8;border-radius:10px;padding:12px;margin-bottom:16px}
.url-text{font-size:13px;color:#1677ff;word-break:break-all;font-weight:500}
.tip{font-size:12px;color:#bbb;line-height:1.8}
.tip strong{color:#1677ff}
.copy-btn{margin-top:16px;width:100%;height:42px;border-radius:10px;border:none;background:linear-gradient(135deg,#1677ff,#0958d9);color:white;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:1px}
.copy-btn:active{opacity:0.85}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:white;padding:8px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📱</div>
  <div class="title">监考人员信息维护器</div>
  <div class="subtitle">扫描下方二维码即可访问使用</div>
  <div id="qrcode"></div>
  <div class="url-box">
    <div class="url-text" id="url-text">https://zhaozhike482-ux.github.io/exam-staff/</div>
  </div>
  <div class="tip">
    使用手机浏览器扫码或点击复制链接<br/>
    <strong>推荐使用微信/支付宝/系统相机扫码</strong>
  </div>
  <button class="copy-btn" onclick="copyUrl()">📋 复制链接</button>
</div>
<div class="toast" id="toast"></div>
<script>
var url = 'https://zhaozhike482-ux.github.io/exam-staff/';
new QRCode(document.getElementById('qrcode'), {
  text: url,
  width: 220,
  height: 220,
  colorDark: '#1a1a1a',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});
function copyUrl(){
  navigator.clipboard.writeText(url).then(function(){
    showToast('✅ 链接已复制到剪贴板');
  }).catch(function(){
    var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('✅ 链接已复制到剪贴板');
  });
}
var tt=null;
function showToast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){e.classList.remove('show')},2000)}
</script>
</body>
</html>
