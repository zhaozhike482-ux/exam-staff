<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src https://api.github.com https://raw.githubusercontent.com; font-src 'none';" />
  <title>监考人员入库申请</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f0f2f5; min-height:100vh; color:#333; }
    .header { background:linear-gradient(135deg,#1677ff,#0958d9); color:white; padding:16px 20px; text-align:center; box-shadow:0 2px 8px rgba(22,119,255,0.3); position:sticky; top:0; z-index:100; }
    .header h1 { font-size:18px; font-weight:600; letter-spacing:1px; }
    .header p { font-size:12px; opacity:0.85; margin-top:4px; }
    .admin-entry { position:absolute; right:16px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4); border-radius:8px; padding:6px 12px; color:white; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:4px; transition:background 0.2s; }
    .admin-entry:hover { background:rgba(255,255,255,0.3); }
    .admin-entry:active { background:rgba(255,255,255,0.15); }
    .admin-entry.active { background:rgba(82,196,26,0.35); border-color:rgba(82,196,26,0.6); }
    .container { padding:16px; max-width:480px; margin:0 auto; }
    .tabs { display:flex; background:white; border-radius:12px; padding:4px; margin-bottom:16px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
    .tab-btn { flex:1; padding:10px; border:none; background:transparent; border-radius:9px; font-size:14px; font-weight:500; color:#666; cursor:pointer; transition:all 0.25s; }
    .tab-btn.active { background:linear-gradient(135deg,#1677ff,#0958d9); color:white; box-shadow:0 2px 6px rgba(22,119,255,0.4); }
    .card { background:white; border-radius:16px; padding:20px; margin-bottom:16px; box-shadow:0 1px 6px rgba(0,0,0,0.08); }
    .card-title { font-size:15px; font-weight:600; color:#1677ff; margin-bottom:16px; display:flex; align-items:center; gap:6px; }
    .card-title::before { content:''; width:3px; height:16px; background:#1677ff; border-radius:2px; display:inline-block; }
    .field-group { margin-bottom:14px; }
    .field-label { font-size:13px; color:#666; margin-bottom:6px; font-weight:500; }
    .field-row { display:flex; gap:8px; align-items:center; }
    .field-input { flex:1; height:44px; border:1.5px solid #e8e8e8; border-radius:10px; padding:0 12px; font-size:15px; outline:none; transition:border-color 0.2s; color:#333; background:#fafafa; box-sizing:border-box; }
    .field-input:focus { border-color:#1677ff; background:white; }
    .field-input.valid { border-color:#52c41a; }
    .field-input.invalid { border-color:#ff4d4f; }
    .field-textarea { flex:1; min-height:80px; border:1.5px solid #e8e8e8; border-radius:10px; padding:10px 12px; font-size:14px; outline:none; transition:border-color 0.2s; color:#333; background:#fafafa; box-sizing:border-box; resize:vertical; line-height:1.5; font-family:inherit; }
    .field-textarea:focus { border-color:#1677ff; background:white; }
    .scan-btn { width:44px; height:44px; border-radius:10px; border:none; background:linear-gradient(135deg,#1677ff,#0958d9); color:white; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 2px 6px rgba(22,119,255,0.35); transition:transform 0.15s,opacity 0.15s; }
    .scan-btn:active { transform:scale(0.92); opacity:0.85; }
    .validate-hint { font-size:11px; margin-top:4px; min-height:16px; }
    .hint-ok { color:#52c41a; }
    .hint-err { color:#ff4d4f; }
    .submit-btn { width:100%; height:50px; border-radius:12px; border:none; background:linear-gradient(135deg,#1677ff,#0958d9); color:white; font-size:16px; font-weight:600; cursor:pointer; letter-spacing:1px; box-shadow:0 4px 12px rgba(22,119,255,0.35); transition:transform 0.15s,opacity 0.15s; }
    .submit-btn:active { transform:scale(0.97); opacity:0.88; }
    /* 照片采集 */
    .photo-area { display:flex; gap:12px; align-items:flex-start; }
    .photo-preview { width:80px; height:80px; border-radius:12px; border:2px dashed #d9d9d9; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; background:#fafafa; position:relative; cursor:pointer; transition:border-color 0.2s; }
    .photo-preview:hover { border-color:#1677ff; }
    .photo-preview img { width:100%; height:100%; object-fit:cover; }
    .photo-preview .photo-placeholder { text-align:center; color:#bbb; font-size:11px; line-height:1.3; }
    .photo-preview .photo-placeholder svg { display:block; margin:0 auto 4px; }
    .photo-btns { display:flex; flex-direction:column; gap:6px; flex:1; }
    .photo-btn { height:36px; border-radius:8px; border:1.5px solid #1677ff; background:white; color:#1677ff; font-size:12px; font-weight:500; cursor:pointer; transition:all 0.2s; }
    .photo-btn:active { background:#e6f4ff; }
    .photo-btn.danger { border-color:#ff4d4f; color:#ff4d4f; }
    .photo-btn.danger:active { background:#fff2f0; }
    .scanner-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:999; flex-direction:column; align-items:center; justify-content:center; }
    .scanner-overlay.show { display:flex; }
    .scanner-box { width:90vw; max-width:380px; background:#111; border-radius:20px; overflow:hidden; position:relative; }
    .scanner-header { background:#1a1a1a; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; }
    .scanner-header span { color:white; font-size:15px; font-weight:600; }
    .scanner-close { color:#aaa; font-size:22px; cursor:pointer; line-height:1; padding:0 4px; }
    .scanner-close:hover { color:white; }
    #scanner-view { width:100%; background:#000; min-height:260px; }
    #scanner-view video { width:100% !important; }
    #html5-qrcode-button-camera-stop, #html5-qrcode-button-camera-start { display:none !important; }
    .scanner-tip { color:#aaa; font-size:12px; text-align:center; padding:12px; }
    .scanner-tip strong { color:#1677ff; }
    .scan-line-wrap { position:absolute; top:48px; left:50%; transform:translateX(-50%); width:200px; height:200px; pointer-events:none; z-index:10; }
    .corner { position:absolute; width:20px; height:20px; }
    .corner-tl { top:0; left:0; border-top:3px solid #1677ff; border-left:3px solid #1677ff; border-radius:3px 0 0 0; }
    .corner-tr { top:0; right:0; border-top:3px solid #1677ff; border-right:3px solid #1677ff; border-radius:0 3px 0 0; }
    .corner-bl { bottom:0; left:0; border-bottom:3px solid #1677ff; border-left:3px solid #1677ff; border-radius:0 0 0 3px; }
    .corner-br { bottom:0; right:0; border-bottom:3px solid #1677ff; border-right:3px solid #1677ff; border-radius:0 0 3px 0; }
    .scan-line { position:absolute; left:0; top:0; right:0; height:2px; background:linear-gradient(to right,transparent,#1677ff,transparent); animation:scanMove 2s linear infinite; }
    @keyframes scanMove { 0%{top:0} 100%{top:calc(100% - 2px)} }
    .records-section .card-title { margin-bottom:10px; }
    .record-count { margin-left:auto; font-size:12px; color:#999; font-weight:400; }
    .record-list { max-height:400px; overflow-y:auto; }
    .record-item { border:1px solid #f0f0f0; border-radius:10px; padding:12px 14px; margin-bottom:8px; background:#fafafa; position:relative; }
    .record-item:last-child { margin-bottom:0; }
    .record-index { position:absolute; top:10px; right:12px; font-size:11px; color:#bbb; }
    .record-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
    .record-row:last-child { margin-bottom:0; }
    .record-label { font-size:11px; color:#999; min-width:56px; }
    .record-val { font-size:13px; color:#333; font-weight:500; word-break:break-all; }
    .record-photo { width:36px; height:36px; border-radius:6px; object-fit:cover; vertical-align:middle; margin-right:6px; }
    .record-time { font-size:11px; color:#bbb; margin-top:6px; }
    .record-delete { position:absolute; bottom:10px; right:12px; color:#ff7875; font-size:12px; cursor:pointer; border:none; background:none; }
    .empty-state { text-align:center; padding:30px 0; color:#bbb; }
    .empty-state .icon { font-size:36px; margin-bottom:8px; }
    .empty-state p { font-size:13px; }
    .action-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    .action-btn { flex:1; min-width:80px; height:40px; border-radius:10px; border:1.5px solid #1677ff; background:white; color:#1677ff; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .action-btn:hover { background:#e6f4ff; }
    .action-btn.danger { border-color:#ff4d4f; color:#ff4d4f; }
    .action-btn.danger:hover { background:#fff2f0; }
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,0.75); color:white; padding:10px 20px; border-radius:8px; font-size:14px; opacity:0; transition:all 0.3s; z-index:9999; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .safe-bottom { height:24px; }
    .login-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
    .login-overlay.show { display:flex; }
    .login-box { background:white; border-radius:20px; width:88vw; max-width:360px; padding:28px 24px 24px; box-shadow:0 12px 40px rgba(0,0,0,0.18); animation:popIn 0.25s ease; }
    @keyframes popIn { from { transform:scale(0.92); opacity:0; } to { transform:scale(1); opacity:1; } }
    .login-icon { text-align:center; font-size:32px; margin-bottom:4px; }
    .login-title { font-size:17px; text-align:center; color:#1677ff; margin-bottom:6px; font-weight:600; }
    .login-sub { font-size:12px; color:#999; text-align:center; margin-bottom:20px; }
    .login-input { width:100%; height:44px; border:1.5px solid #e8e8e8; border-radius:10px; padding:0 12px; font-size:15px; outline:none; margin-bottom:6px; box-sizing:border-box; }
    .login-input:focus { border-color:#1677ff; }
    .login-hint { font-size:11px; min-height:16px; margin-bottom:12px; }
    .login-btn { width:100%; height:44px; border-radius:10px; border:none; background:linear-gradient(135deg,#1677ff,#0958d9); color:white; font-size:15px; font-weight:600; cursor:pointer; letter-spacing:1px; }
    .login-btn:active { opacity:0.85; }
    .login-cancel { width:100%; height:38px; border-radius:10px; border:none; background:#f5f5f5; color:#999; font-size:13px; cursor:pointer; margin-top:8px; }
    .chpwd-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1001; flex-direction:column; align-items:center; justify-content:center; }
    .chpwd-overlay.show { display:flex; }
    .chpwd-box { background:white; border-radius:20px; width:88vw; max-width:360px; padding:28px 24px 24px; box-shadow:0 12px 40px rgba(0,0,0,0.18); animation:popIn 0.25s ease; }
    .chpwd-icon { text-align:center; font-size:32px; margin-bottom:4px; }
    .chpwd-title { font-size:17px; text-align:center; color:#1677ff; margin-bottom:6px; font-weight:600; }
    .chpwd-sub { font-size:12px; color:#999; text-align:center; margin-bottom:20px; }
    .chpwd-input { width:100%; height:44px; border:1.5px solid #e8e8e8; border-radius:10px; padding:0 12px; font-size:15px; outline:none; margin-bottom:6px; box-sizing:border-box; }
    .chpwd-input:focus { border-color:#1677ff; }
    .chpwd-hint { font-size:11px; min-height:16px; margin-bottom:12px; }
    .chpwd-btn { width:100%; height:44px; border-radius:10px; border:none; background:linear-gradient(135deg,#1677ff,#0958d9); color:white; font-size:15px; font-weight:600; cursor:pointer; letter-spacing:1px; }
    .chpwd-btn:active { opacity:0.85; }
    .chpwd-cancel { width:100%; height:38px; border-radius:10px; border:none; background:#f5f5f5; color:#999; font-size:13px; cursor:pointer; margin-top:8px; }
    .search-box { display:flex; gap:8px; margin-bottom:12px; }
    .search-input { flex:1; height:38px; border:1.5px solid #e8e8e8; border-radius:10px; padding:0 12px; font-size:14px; outline:none; background:#fafafa; box-sizing:border-box; }
    .search-input:focus { border-color:#1677ff; background:white; }
    .search-clear { width:38px; height:38px; border-radius:10px; border:1.5px solid #e8e8e8; background:white; color:#999; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .search-clear:hover { color:#ff4d4f; }
    .trash-section { margin-top:16px; }
    .trash-toggle { display:flex; align-items:center; gap:6px; padding:10px 14px; border:1px solid #f0f0f0; border-radius:10px; background:#fafafa; cursor:pointer; width:100%; font-size:13px; color:#666; font-weight:500; transition:background 0.2s; }
    .trash-toggle:hover { background:#f0f0f0; }
    .trash-toggle .arrow { transition:transform 0.2s; font-size:10px; }
    .trash-toggle.open .arrow { transform:rotate(90deg); }
    .trash-body { display:none; border:1px solid #f0f0f0; border-top:none; border-radius:0 0 10px 10px; padding:12px 14px; background:#fafafa; }
    .trash-body.show { display:block; }
    .trash-count { margin-left:auto; font-size:11px; color:#bbb; }
    .trash-actions { display:flex; gap:8px; margin-bottom:10px; }
    .trash-action-btn { flex:1; height:34px; border-radius:8px; border:1.5px solid #1677ff; background:white; color:#1677ff; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .trash-action-btn:hover { background:#e6f4ff; }
    .trash-action-btn.danger { border-color:#ff4d4f; color:#ff4d4f; }
    .trash-action-btn.danger:hover { background:#fff2f0; }
    .record-restore { position:absolute; bottom:10px; right:56px; color:#1677ff; font-size:12px; cursor:pointer; border:none; background:none; }
    .confirm-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1002; flex-direction:column; align-items:center; justify-content:center; }
    .confirm-overlay.show { display:flex; }
    .confirm-box { background:white; border-radius:20px; width:80vw; max-width:320px; padding:28px 24px 20px; box-shadow:0 12px 40px rgba(0,0,0,0.18); animation:popIn 0.25s ease; text-align:center; }
    .confirm-icon { font-size:28px; margin-bottom:4px; }
    .confirm-title { font-size:16px; color:#333; font-weight:600; margin-bottom:6px; }
    .confirm-msg { font-size:13px; color:#666; margin-bottom:20px; line-height:1.6; }
    .confirm-actions { display:flex; gap:12px; }
    .confirm-cancel { flex:1; height:40px; border-radius:10px; border:none; background:#f5f5f5; color:#999; font-size:14px; cursor:pointer; font-weight:500; }
    .confirm-cancel:active { background:#e8e8e8; }
    .confirm-ok { flex:1; height:40px; border-radius:10px; border:none; background:linear-gradient(135deg,#1677ff,#0958d9); color:white; font-size:14px; cursor:pointer; font-weight:600; }
    .confirm-ok:active { opacity:0.85; }
    /* 照片查看弹窗 */
    .photo-view-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:1003; align-items:center; justify-content:center; }
    .photo-view-overlay.show { display:flex; }
    .photo-view-overlay img { max-width:90vw; max-height:80vh; border-radius:12px; }
    .photo-view-close { position:absolute; top:20px; right:20px; color:white; font-size:28px; cursor:pointer; }
    /* 加载指示器 */
    .loading-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:2000; align-items:center; justify-content:center; }
    .loading-overlay.show { display:flex; }
    .loading-box { background:white; border-radius:16px; padding:24px 32px; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,0.18); }
    .loading-spinner { width:36px; height:36px; border:3px solid #e8e8e8; border-top-color:#1677ff; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-size:14px; color:#666; }
  </style>
</head>
<body>

<div class="header">
  <h1>&#x1F4F1; 监考人员入库申请</h1>
  <p>支持扫描二维码 / 条形码自动录入</p>
  <button class="admin-entry" id="admin-entry-btn" onclick="handleAdminEntry()">&#x1F512; <span id="admin-entry-text">管理</span></button>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('input')">&#x270D;&#xFE0F; 录入</button>
    <button class="tab-btn" id="tab-records-btn" onclick="switchTab('records')" style="display:none;">&#x1F4CB; 记录 <span id="lock-icon" style="font-size:12px;">&#x1F512;</span></button>
  </div>

  <div id="tab-input">
    <div class="card">
      <div class="card-title">入库信息填写</div>
      <div class="field-group">
        <div class="field-label">&#x1F464; 姓名 <span style="color:#ff4d4f;font-size:13px;">*</span></div>
        <input id="name" class="field-input" type="text" maxlength="20" placeholder="请输入真实姓名（必填）" oninput="validateName()" autocomplete="off" />
        <div id="name-hint" class="validate-hint"></div>
      </div>
      <div class="field-group">
        <div class="field-label">&#x1F4DE; 手机号码</div>
        <div class="field-row">
          <input id="phone" class="field-input" type="tel" maxlength="11" placeholder="请输入或扫码获取" oninput="validatePhone()" autocomplete="off" />
          <button class="scan-btn" onclick="openScanner('phone')" title="扫码">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 7V5a2 2 0 012-2h2"/><path d="M17 3h2a2 2 0 012 2v2"/><path d="M21 17v2a2 2 0 01-2 2h-2"/><path d="M7 21H5a2 2 0 01-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg>
          </button>
        </div>
        <div id="phone-hint" class="validate-hint"></div>
      </div>
      <div class="field-group">
        <div class="field-label">&#x1F9A6; 身份证号码</div>
        <input id="idcard" class="field-input" type="text" maxlength="18" placeholder="请输入身份证号码" oninput="validateIdcard()" autocomplete="off" style="text-transform:uppercase;" />
        <div id="idcard-hint" class="validate-hint"></div>
      </div>
      <div class="field-group">
        <div class="field-label">&#x1F3AE; 学号/工号</div>
        <input id="empno" class="field-input" type="text" maxlength="30" placeholder="请输入学号或工号" autocomplete="off" />
      </div>
      <div class="field-group">
        <div class="field-label">&#x1F3E6; 工行卡号</div>
        <input id="bankcard" class="field-input" type="text" maxlength="19" placeholder="请输入工商银行卡号" oninput="validateBankcard()" autocomplete="off" />
        <div id="bankcard-hint" class="validate-hint"></div>
      </div>
      <div class="field-group">
        <div class="field-label">&#x1F4F7; 照片采集</div>
        <div class="photo-area">
          <div class="photo-preview" id="photo-preview" onclick="document.getElementById('photo-file').click()">
            <div class="photo-placeholder" id="photo-placeholder">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="10" r="3"/><path d="M6 21v-1a6 6 0 0112 0v1"/></svg>
              点击拍照/选图
            </div>
          </div>
          <div class="photo-btns">
            <button class="photo-btn" onclick="document.getElementById('photo-file').click()">&#x1F4F7; 拍照/选择照片</button>
            <button class="photo-btn danger" onclick="clearPhoto()">&#x274C; 清除照片</button>
          </div>
          <input type="file" id="photo-file" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)" />
        </div>
      </div>
      <div class="field-group">
        <div class="field-label">&#x1F4C4; 个人简历</div>
        <textarea id="resume" class="field-textarea" maxlength="500" placeholder="请简要填写个人简历（学历、工作经历等）"></textarea>
      </div>
      <div class="field-group">
        <div class="field-label">&#x1F4DD; 备注（选填）</div>
        <input id="remark" class="field-input" type="text" maxlength="50" placeholder="部门、备注等附加信息" />
      </div>
      <button class="submit-btn" onclick="submitRecord()">&#x2705; 提交申请</button>
    </div>
  </div>

  <div id="tab-records" style="display:none;">
    <div class="action-bar">
      <button class="action-btn" onclick="exportCSV()">&#x2B07;&#xFE0F; 导出CSV</button>
      <button class="action-btn" onclick="copyAll()">&#x1F4CB; 复制全部</button>
      <button class="action-btn" onclick="openChangePwd()">&#x1F510; 改密码</button>
    </div>
    <div class="search-box">

<script>
/* ---- SHA-256 哈希工具 ---- */
async function sha256(str) {
  var buf = new TextEncoder().encode(str);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

/* ---- HTML 转义（防 XSS） ---- */
function escHtml(str) {
  if (!str) return '';
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

/* ---- AES-GCM 加密工具 ---- */
var _encKey = null;
var _encSalt = null;

function _getEncSalt() {
  if (_encSalt) return _encSalt;
  var s = localStorage.getItem('scan_tool_enc_salt');
  if (s) {
    var raw = atob(s);
    _encSalt = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) _encSalt[i] = raw.charCodeAt(i);
    return _encSalt;
  }
  _encSalt = crypto.getRandomValues(new Uint8Array(16));
  localStorage.setItem('scan_tool_enc_salt', btoa(String.fromCharCode.apply(null, _encSalt)));
  return _encSalt;
}

async function deriveEncKey(password) {
  var salt = _getEncSalt();
  var enc = new TextEncoder();
  var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encField(plaintext, key) {
  var iv = crypto.getRandomValues(new Uint8Array(12));
  var enc = new TextEncoder();
  var cipherBuf = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(plaintext));
  var ivB64 = btoa(String.fromCharCode.apply(null, iv));
  var ctB64 = btoa(String.fromCharCode.apply(null, new Uint8Array(cipherBuf)));
  return '[ENC]' + ivB64 + '.' + ctB64;
}

async function decField(cipherStr, key) {
  if (!cipherStr || cipherStr.indexOf('[ENC]') !== 0) return cipherStr;
  try {
    var parts = cipherStr.substring(5).split('.');
    var ivStr = atob(parts[0]);
    var ctStr = atob(parts[1]);
    var iv = new Uint8Array(ivStr.length);
    var ct = new Uint8Array(ctStr.length);
    for (var i = 0; i < ivStr.length; i++) iv[i] = ivStr.charCodeAt(i);
    for (var i = 0; i < ctStr.length; i++) ct[i] = ctStr.charCodeAt(i);
    var decBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
    return new TextDecoder().decode(decBuf);
  } catch(e) {
    return cipherStr;
  }
}

/* 加密记录中的敏感字段 */
async function encryptRecord(r, key) {
  if (!key) return r;
  var nr = {};
  for (var k in r) nr[k] = r[k];
  if (nr.idcard && nr.idcard.indexOf('[ENC]') !== 0) nr.idcard = await encField(nr.idcard, key);
  if (nr.bankcard && nr.bankcard.indexOf('[ENC]') !== 0) nr.bankcard = await encField(nr.bankcard, key);
  return nr;
}

/* 解密记录中的敏感字段 */
async function decryptRecord(r, key) {
  if (!key) return r;
  var nr = {};
  for (var k in r) nr[k] = r[k];
  if (nr.idcard && nr.idcard.indexOf('[ENC]') === 0) nr.idcard = await decField(nr.idcard, key);
  if (nr.bankcard && nr.bankcard.indexOf('[ENC]') === 0) nr.bankcard = await decField(nr.bankcard, key);
  return nr;
}

/* 批量解密 */
async function decryptAllRecords(recs, key) {
  var result = [];
  for (var i = 0; i < recs.length; i++) result.push(await decryptRecord(recs[i], key));
  return result;
}

/* 批量加密 */
async function encryptAllRecords(recs, key) {
  var result = [];
  for (var i = 0; i < recs.length; i++) result.push(await encryptRecord(recs[i], key));
  return result;
}

/* ---- 管理员密码配置 ---- */
var PWD_STORE_KEY = 'scan_tool_pwd_hash';
var ADMIN_KEY     = 'scan_tool_admin';
var DEFAULT_PWD   = 'admin123';

async function getStoredHash() {
  var stored = localStorage.getItem(PWD_STORE_KEY);
  if (stored) return stored;
  var h = await sha256(DEFAULT_PWD);
  localStorage.setItem(PWD_STORE_KEY, h);
  return h;
}

async function verifyPwd(pwd) {
  var h = await sha256(pwd);
  var stored = await getStoredHash();
  return h === stored;
}

function isAdmin() { return sessionStorage.getItem(ADMIN_KEY) === '1'; }

/* ---- 会话超时 ---- */
var SESSION_TIMEOUT = 30 * 60 * 1000;  // 30分钟
var sessionTimer = null;
function resetSessionTimer() {
  clearTimeout(sessionTimer);
  if (isAdmin()) {
    sessionTimer = setTimeout(function(){
      logoutAdmin();
      showToast('\u26A0\uFE0F 会话已超时，请重新登录');
    }, SESSION_TIMEOUT);
  }
}
document.addEventListener('click', function(){ if (isAdmin()) resetSessionTimer(); });
document.addEventListener('keydown', function(){ if (isAdmin()) resetSessionTimer(); });
document.addEventListener('visibilitychange', function(){
  if (!document.hidden && isAdmin()) resetSessionTimer();
});

/* ---- 自定义确认对话框 ---- */
var confirmCallback = null;
function showConfirm(title, msg, onOk) {
  document.getElementById('confirm-title').textContent = title || '确认操作';
  document.getElementById('confirm-msg').textContent = msg || '确定执行此操作？';

}

function logoutAdmin() {
  clearTimeout(sessionTimer);

  sessionStorage.removeItem(ADMIN_KEY);

/* ---- 修改密码弹窗 ---- */
function openChangePwd() {
  if (!requireAdmin()) return;
  document.getElementById('chpwd-overlay').classList.add('show');
  ['chpwd-old','chpwd-new','chpwd-confirm'].forEach(function(id){ document.getElementById(id).value = ''; });
  document.getElementById('chpwd-hint').textContent = '';
  setTimeout(function(){ document.getElementById('chpwd-old').focus(); }, 100);
}
function closeChangePwd() { document.getElementById('chpwd-overlay').classList.remove('show'); }

async function doChangePwd() {
  var oldPwd = document.getElementById('chpwd-old').value;
  var newPwd = document.getElementById('chpwd-new').value;
  var confirmPwd = document.getElementById('chpwd-confirm').value;
  var hint = document.getElementById('chpwd-hint');
  if (!oldPwd) { hint.style.color = '#ff4d4f'; hint.textContent = '请输入当前密码'; return; }
  if (!newPwd) { hint.style.color = '#ff4d4f'; hint.textContent = '请输入新密码'; return; }
  if (newPwd.length < 6) { hint.style.color = '#ff4d4f'; hint.textContent = '新密码至少6位'; return; }
  if (newPwd !== confirmPwd) { hint.style.color = '#ff4d4f'; hint.textContent = '两次输入的新密码不一致'; return; }
  var oldOk = await verifyPwd(oldPwd);
  if (!oldOk) { hint.style.color = '#ff4d4f'; hint.textContent = '当前密码错误'; return; }
  var newHash = await sha256(newPwd);
  localStorage.setItem(PWD_STORE_KEY, newHash);
  saveRecords();
  closeChangePwd();
  sessionStorage.removeItem(ADMIN_KEY);
  updateLockUI();
  switchTab('input');
  showToast('\u2705 密码修改成功，请重新登录');
}

/* ---- 登录弹窗 ---- */
var LOGIN_ATTEMPTS = 0;
var LOGIN_LOCKED_UNTIL = 0;
var MAX_LOGIN_ATTEMPTS = 5;
var LOGIN_LOCK_DURATION = 5 * 60 * 1000;  // 5分钟

function openLogin() {
  var now = Date.now();
  if (now < LOGIN_LOCKED_UNTIL) {
    var remain = Math.ceil((LOGIN_LOCKED_UNTIL - now) / 60000);
    showToast('\u26A0\uFE0F 登录已锁定，请 ' + remain + ' 分钟后重试');
    return;
  }
  document.getElementById('login-overlay').classList.add('show');
  var pw = document.getElementById('admin-pwd');
  pw.value = '';
  document.getElementById('login-hint').textContent = '';
  setTimeout(function(){ pw.focus(); }, 100);
}
function closeLogin() { document.getElementById('login-overlay').classList.remove('show'); }

async function doLogin() {
  var pwd  = document.getElementById('admin-pwd').value;
  var hint = document.getElementById('login-hint');
  var now = Date.now();
  if (now < LOGIN_LOCKED_UNTIL) {
    var remain = Math.ceil((LOGIN_LOCKED_UNTIL - now) / 60000);
    hint.style.color = '#ff4d4f'; hint.textContent = '登录已锁定，请 ' + remain + ' 分钟后重试';
    return;
  }
  if (!pwd) { hint.style.color = '#ff4d4f'; hint.textContent = '请输入密码'; return; }
  var ok = await verifyPwd(pwd);
  if (!ok) {
    LOGIN_ATTEMPTS++;
    if (LOGIN_ATTEMPTS >= MAX_LOGIN_ATTEMPTS) {
      LOGIN_LOCKED_UNTIL = now + LOGIN_LOCK_DURATION;
      LOGIN_ATTEMPTS = 0;
      hint.style.color = '#ff4d4f'; hint.textContent = '错误次数过多，已锁定5分钟';
    } else {
      hint.style.color = '#ff4d4f'; hint.textContent = '密码错误，还剩 ' + (MAX_LOGIN_ATTEMPTS - LOGIN_ATTEMPTS) + ' 次机会';
    }
    return;
  }
  LOGIN_ATTEMPTS = 0;
  sessionStorage.setItem(ADMIN_KEY, '1');
  /* 派生加密密钥 */
  try { _encKey = await deriveEncKey(pwd); } catch(e) {}
  closeLogin();
  updateLockUI();
  document.getElementById('tab-records-btn').style.display = '';
  document.getElementById('tab-input').style.display = 'none';
  document.getElementById('tab-records').style.display = '';
  document.querySelectorAll('.tab-btn')[0].classList.remove('active');
  document.querySelectorAll('.tab-btn')[1].classList.add('active');
  loadRecords(function(){
    renderRecords();
    updateTrashCount();
  });
  showToast('\u2705 管理员已解锁');
  resetSessionTimer();
}

/* ---- Tab 切换 ---- */
function switchTab(tab) {
  if (tab === 'records' && !isAdmin()) { openLogin(); return; }
  document.getElementById('tab-input').style.display  = tab === 'input' ? '' : 'none';
  document.getElementById('tab-records').style.display = tab === 'records' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach(function(btn, i){
    btn.classList.toggle('active', (i===0 && tab==='input') || (i===1 && tab==='records'));
  });
  if (tab === 'records') loadRecords(function(){ renderRecords(); updateTrashCount(); });
  if (tab === 'input' && !isAdmin()) { document.getElementById('tab-records-btn').style.display = 'none'; }
}

function requireAdmin() {
  if (!isAdmin()) { showToast('\u26A0\uFE0F 请先以管理员身份解锁'); return false; }
  return true;
}

/* ---- 姓名校验 ---- */
function validateName() {
  var el = document.getElementById('name');
  var hint = document.getElementById('name-hint');
  var v = el.value.trim();
  if (!v) { el.className='field-input'; hint.textContent=''; return false; }
  var ok = v.length >= 2;
  el.className = 'field-input ' + (ok ? 'valid' : 'invalid');
  hint.className = 'validate-hint ' + (ok ? 'hint-ok' : 'hint-err');
  hint.textContent = ok ? '\u2713 姓名已填写' : '\u2717 姓名至少需要2个字';
  return ok;
}

/* ---- 手机号校验 ---- */
function validatePhone() {
  var el = document.getElementById('phone');
  var hint = document.getElementById('phone-hint');
  var v = el.value.trim();
  if (!v) { el.className='field-input'; hint.textContent=''; return null; }
  var ok = /^1[3-9]\d{9}$/.test(v);
  el.className = 'field-input ' + (ok ? 'valid' : 'invalid');
  hint.className = 'validate-hint ' + (ok ? 'hint-ok' : 'hint-err');
  hint.textContent = ok ? '\u2713 手机号格式正确' : '\u2717 请输入11位有效手机号';
  return ok;
}

/* ---- 身份证校验 ---- */
function validateIdcard() {
  var el = document.getElementById('idcard');
  var hint = document.getElementById('idcard-hint');
  var v = el.value.trim().toUpperCase();
  el.value = v;
  if (!v) { el.className='field-input'; hint.textContent=''; return null; }
  var ok = checkIdcard(v);
  el.className = 'field-input ' + (ok ? 'valid' : 'invalid');
  hint.className = 'validate-hint ' + (ok ? 'hint-ok' : 'hint-err');
  hint.textContent = ok ? '\u2713 身份证格式正确' : '\u2717 身份证号格式有误';
  return ok;
}
function checkIdcard(id) {
  if (!/^\d{17}[\dX]$/.test(id)) return false;
  var w = [7,9,10,5,8,4,2,1,6,3,7,9,10,5,8,4,2];
  var c = ['1','0','X','9','8','7','6','5','4','3','2'];
  var s = 0;
  for (var i=0; i<17; i++) s += parseInt(id[i]) * w[i];
  return c[s % 11] === id[17];
}

/* ---- 工行卡号校验 ---- */
function validateBankcard() {
  var el = document.getElementById('bankcard');
  var hint = document.getElementById('bankcard-hint');
  var v = el.value.replace(/\s/g,'');
  if (!v) { el.className='field-input'; hint.textContent=''; return null; }
  var ok = /^\d{16,19}$/.test(v);
  el.className = 'field-input ' + (ok ? 'valid' : 'invalid');
  hint.className = 'validate-hint ' + (ok ? 'hint-ok' : 'hint-err');
  hint.textContent = ok ? '\u2713 卡号格式正确' : '\u2717 请输入16-19位银行卡号';
  return ok;
}

/* ---- 照片采集 ---- */
var currentPhotoData = '';
function onPhotoSelected(e) {
  var file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('\u26A0\uFE0F 照片不能超过5MB'); return; }
  var reader = new FileReader();
  reader.onload = function(ev) {
    /* 压缩照片到合理大小 */
    var img = new Image();
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var maxW = 400;
      var scale = Math.min(maxW / img.width, 1);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      currentPhotoData = canvas.toDataURL('image/jpeg', 0.7);
      var preview = document.getElementById('photo-preview');
      preview.innerHTML = '<img src="' + currentPhotoData + '" />';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}
function clearPhoto() {
  currentPhotoData = '';
  var preview = document.getElementById('photo-preview');
  preview.innerHTML = '<div class="photo-placeholder" id="photo-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="10" r="3"/><path d="M6 21v-1a6 6 0 0112 0v1"/></svg>点击拍照/选图</div>';
}

/* ---- 扫码 ---- */
var html5QrCode = null;
var currentScanTarget = null;

function openScanner(target) {
  currentScanTarget = target;
  document.getElementById('scanner-title').textContent = '扫描二维码 / 条形码（识别手机号）';
  document.getElementById('scanner-overlay').classList.add('show');
  startScanner();
}
function startScanner() {
  if (html5QrCode) { html5QrCode.stop().catch(function(){}); html5QrCode.clear(); }
  html5QrCode = new Html5Qrcode('scanner-view');
  html5QrCode.start({ facingMode:'environment' }, { fps:12, qrbox:{width:200,height:200} }, onScanSuccess, function(){})
    .catch(function(){ showToast('摄像头启动失败，请检查权限设置'); closeScanner(); });
}
function onScanSuccess(t) {
  var raw = t.trim();
  var val = '';
  var m = raw.match(/1[3-9]\d{9}/);
  val = m ? m[0] : raw.replace(/\D/g,'').slice(0,11);
  if (val) {
    document.getElementById('phone').value = val;
    validatePhone();
    closeScanner();
    showToast('\u2705 扫码成功');
  }
}
function closeScanner() {
  document.getElementById('scanner-overlay').classList.remove('show');
  if (html5QrCode) { html5QrCode.stop().catch(function(){}); html5QrCode.clear(); html5QrCode = null; }
}

/* ---- GitHub 云端存储 ---- */
var _a = [103,104,112,95,53,108,87,78,86,69,99,106,82,100,80];
var _b = '88,111,115,79,53,121,114,100,68,50,106,110,65,77,104,112,116,105,89,49,116,65,116,48,66';
var GH_OWNER = 'zhaozhike482-ux';
var GH_REPO  = 'exam-staff';
var GH_FILE  = 'data.json';
var GH_API   = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_FILE;
var GH_RAW   = 'https://raw.githubusercontent.com/' + GH_OWNER + '/' + GH_REPO + '/main/' + GH_FILE;
var ghSha = '';
var isLoading = false;
var isSaving  = false;

function _gT() { return _a.map(function(c){ return String.fromCharCode(c); }).join('') + _b.split(',').map(function(c){ return String.fromCharCode(parseInt(c)); }).join(''); }

function loadRecords(onDone) {
  if (isLoading) return;
  isLoading = true;
  var lo = document.getElementById('loading-overlay');
  if (lo) lo.classList.add('show');
  /* 先获取文件SHA，再获取内容 */
  fetch(GH_API, { headers: { 'Authorization': 'token ' + _gT() } })
    .then(function(r){ return r.json(); })
    .then(function(info){ if (info.sha) ghSha = info.sha; })
    .catch(function(){});
  fetch(GH_RAW + '?t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      records = data.records || [];
      trashRecords = data.trashRecords || [];
      if (data.pwdHash) localStorage.setItem(PWD_STORE_KEY, data.pwdHash);
      /* 如果有加密密钥，自动解密敏感字段 */
      if (_encKey) {
        Promise.all([decryptAllRecords(records, _encKey), decryptAllRecords(trashRecords, _encKey)]).then(function(res){
          records = res[0]; trashRecords = res[1];
          if (onDone) onDone();
        }).catch(function(){ if (onDone) onDone(); });
      } else {
        if (onDone) onDone();
      }
    })
    .catch(function(){
      showToast('\u26A0\uFE0F 云端加载失败，使用本地数据');
      records = JSON.parse(localStorage.getItem('scan_records') || '[]');
      trashRecords = JSON.parse(localStorage.getItem('scan_trash_records') || '[]');
      if (onDone) onDone();
    })
    .finally(function(){ isLoading = false; if (lo) lo.classList.remove('show'); });
}

function saveRecords(onDone) {
  if (isSaving) return;
  isSaving = true;
  var lo = document.getElementById('loading-overlay');
  var lt = document.getElementById('loading-text');
  if (lo) lo.classList.add('show');
  if (lt) lt.textContent = '正在保存到云端...';
  /* 如果有加密密钥，先加密敏感字段再保存 */
  var saveData = { records: records, trashRecords: trashRecords, pwdHash: localStorage.getItem(PWD_STORE_KEY) || '' };
  var doSave = function(payload) {
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
        var bodyObj = { message: "Update " + new Date().toLocaleString("zh-CN"), content: content };
        if (ghSha) bodyObj.sha = ghSha;
        var body = JSON.stringify(bodyObj);
    var headers = { 'Authorization': 'token ' + _gT(), 'Content-Type': 'application/json' };
    fetch(GH_API, { method: 'PUT', headers: headers, body: body })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.content) ghSha = data.content.sha;
        localStorage.setItem('scan_records', JSON.stringify(records));
        localStorage.setItem('scan_trash_records', JSON.stringify(trashRecords));
        if (onDone) onDone();
      })
      .catch(function(){
        showToast('\u26A0\uFE0F 云端保存失败，已存本地');
        localStorage.setItem('scan_records', JSON.stringify(records));
        localStorage.setItem('scan_trash_records', JSON.stringify(trashRecords));
        if (onDone) onDone();
      })
      .finally(function(){ isSaving = false; if (lo) lo.classList.remove('show'); if (lt) lt.textContent = '正在同步云端数据...'; });
  };
  if (_encKey) {
    Promise.all([encryptAllRecords(records, _encKey), encryptAllRecords(trashRecords, _encKey)]).then(function(res){
      var encPayload = { records: res[0], trashRecords: res[1], pwdHash: saveData.pwdHash };
      doSave(encPayload);
    });
  } else {
    doSave(saveData);
  }
}

/* ---- 提交记录 ---- */
var records = [];
var trashRecords = [];
var searchKeyword = ''; var trashOpen = false;

function submitRecord() {
  var name     = document.getElementById('name').value.trim();
  var phone    = document.getElementById('phone').value.trim();
  var idcard   = document.getElementById('idcard').value.trim().toUpperCase();
  var empno    = document.getElementById('empno').value.trim();
  var bankcard = document.getElementById('bankcard').value.trim().replace(/\s/g,'');
  var resume   = document.getElementById('resume').value.trim();
  var remark   = document.getElementById('remark').value.trim();
  if (!name)           { showToast('\u26A0\uFE0F 请填写姓名');   document.getElementById('name').focus(); return; }
  if (name.length < 2) { showToast('\u26A0\uFE0F 姓名至少2个字'); return; }
  if (!phone && !idcard) { showToast('\u26A0\uFE0F 请至少填写手机号或身份证号'); return; }
  if (phone && !/^1[3-9]\d{9}$/.test(phone)) { showToast('\u26A0\uFE0F 手机号格式有误'); return; }
  if (idcard && !checkIdcard(idcard))           { showToast('\u26A0\uFE0F 身份证号格式有误'); return; }
  if (bankcard && !/^\d{16,19}$/.test(bankcard)) { showToast('\u26A0\uFE0F 工行卡号格式有误'); return; }
  var newRecord = {
    id: Date.now(),
    name: name,
    phone: phone,
    idcard: idcard,
    empno: empno,
    bankcard: bankcard,
    photo: currentPhotoData,
    resume: resume,
    remark: remark,
    time: new Date().toLocaleString('zh-CN')
  };
  /* 先拉取最新云端数据，再合并提交，避免覆盖他人数据 */
  loadRecords(function(){
    records.unshift(newRecord);
    saveRecords(function(){
      showToast('\u2705 提交成功！');
    });
  });
  ['name','phone','idcard','empno','bankcard','resume','remark'].forEach(function(id){
    document.getElementById(id).value = ''; document.getElementById(id).className = id === 'resume' ? 'field-textarea' : 'field-input';
  });
  ['name-hint','phone-hint','idcard-hint','bankcard-hint'].forEach(function(id){ document.getElementById(id).textContent = ''; });
  clearPhoto();
}

/* ---- 渲染记录 ---- */
function renderRecords() {
  if (!isAdmin()) return;
  var list = document.getElementById('record-list');
  var filtered = records;
  if (searchKeyword) {
    var kw = searchKeyword.toLowerCase();
    filtered = records.filter(function(r){
      return (r.name||'').toLowerCase().indexOf(kw) >= 0 ||
             (r.phone||'').indexOf(kw) >= 0 ||
             (r.idcard||'').toUpperCase().indexOf(kw.toUpperCase()) >= 0 ||
             (r.empno||'').toLowerCase().indexOf(kw) >= 0 ||
             (r.bankcard||'').indexOf(kw) >= 0 ||
             (r.remark||'').toLowerCase().indexOf(kw) >= 0;
    });
  }
  var totalTxt = searchKeyword ? ('\u641c\u7d22 ' + filtered.length + ' / \u5171 ' + records.length + ' \u6761') : ('\u5171 ' + records.length + ' \u6761');
  document.getElementById('record-count').textContent = totalTxt;
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">\ud83d\udced</div><p>' + (searchKeyword ? '\u672a\u627e\u5230\u5339\u914d\u8bb0\u5f55' : '\u6682\u65e0\u8bb0\u5f55\uff0c\u8bf7\u5148\u5f55\u5165\u4fe1\u606f') + '</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    var idx = records.length - records.indexOf(r);
    html += '<div class="record-item">';
    html += '<span class="record-index">#' + idx + '</span>';
    if (r.photo) html += '<div class="record-row"><span class="record-label">\u7167\u7247</span><span class="record-val"><img class="record-photo" src="' + escHtml(r.photo) + '" onclick="viewPhoto(this.src)" /></span></div>';
    html += '<div class="record-row"><span class="record-label">\u59d3\u540d</span><span class="record-val">' + highlightText(escHtml(r.name||'-')) + '</span></div>';
    if (r.phone)    html += '<div class="record-row"><span class="record-label">\u624b\u673a\u53f7</span><span class="record-val">' + highlightText(escHtml(r.phone)) + '</span></div>';
    if (r.idcard)   html += '<div class="record-row"><span class="record-label">\u8eab\u4efd\u8bc1</span><span class="record-val">' + highlightText(escHtml(r.idcard)) + '</span></div>';
    if (r.empno)    html += '<div class="record-row"><span class="record-label">\u5b66\u53f7/\u5de5\u53f7</span><span class="record-val">' + highlightText(escHtml(r.empno)) + '</span></div>';
    if (r.bankcard) html += '<div class="record-row"><span class="record-label">\u5de5\u884c\u5361\u53f7</span><span class="record-val">' + highlightText(escHtml(r.bankcard)) + '</span></div>';
    if (r.resume)   html += '<div class="record-row"><span class="record-label">\u7b80\u5386</span><span class="record-val" style="white-space:pre-wrap;">' + highlightText(escHtml(r.resume.length > 60 ? r.resume.substring(0,60) + '...' : r.resume)) + '</span></div>';
    if (r.remark)   html += '<div class="record-row"><span class="record-label">\u5907\u6ce8</span><span class="record-val">' + highlightText(escHtml(r.remark)) + '</span></div>';
    html += '<div class="record-time">' + escHtml(r.time) + '</div>';
    html += '<button class="record-delete" onclick="if(requireAdmin())deleteRecord(' + r.id + ')">\u5220\u9664</button>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function highlightText(text) {
  if (!searchKeyword || !text) return text;
  var kw = searchKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(kw, 'gi'), '<span style="color:#1677ff;font-weight:700;">$&</span>');
}

function onSearch() {
  searchKeyword = document.getElementById('search-input').value.trim();
  renderRecords();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  searchKeyword = '';
  renderRecords();
}
function deleteRecord(id) {
  var target = records.filter(function(r){ return r.id === id; })[0];
  if (!target) return;
  records = records.filter(function(r){ return r.id !== id; });
  trashRecords.unshift(target);
  saveRecords(function(){
    renderRecords();
    updateTrashCount();
    showToast('\u2705 已移入回收站');
  });
}

function toggleTrash() {
  trashOpen = !trashOpen;
  var toggle = document.getElementById('trash-toggle');
  var body = document.getElementById('trash-body');
  if (trashOpen) { toggle.classList.add('open'); body.classList.add('show'); renderTrash(); }
  else { toggle.classList.remove('open'); body.classList.remove('show'); }
}

function updateTrashCount() {
  var el = document.getElementById('trash-count');
  if (el) el.textContent = trashRecords.length + ' \u6761';
}

function renderTrash() {
  if (!isAdmin()) return;
  var list = document.getElementById('trash-list');
  updateTrashCount();
  if (!trashRecords.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">\ud83d\udced</div><p>\u56de\u6536\u7ad9\u4e3a\u7a7a</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < trashRecords.length; i++) {
    var r = trashRecords[i];
    var idx = trashRecords.length - i;
    html += '<div class="record-item">';
    html += '<span class="record-index">#' + idx + '</span>';
    html += '<div class="record-row"><span class="record-label">\u59d3\u540d</span><span class="record-val">' + escHtml(r.name||'-') + '</span></div>';
    if (r.phone)    html += '<div class="record-row"><span class="record-label">\u624b\u673a\u53f7</span><span class="record-val">' + escHtml(r.phone) + '</span></div>';
    if (r.idcard)   html += '<div class="record-row"><span class="record-label">\u8eab\u4efd\u8bc1</span><span class="record-val">' + escHtml(r.idcard) + '</span></div>';
    if (r.empno)    html += '<div class="record-row"><span class="record-label">\u5b66\u53f7/\u5de5\u53f7</span><span class="record-val">' + escHtml(r.empno) + '</span></div>';
    if (r.bankcard) html += '<div class="record-row"><span class="record-label">\u5de5\u884c\u5361\u53f7</span><span class="record-val">' + escHtml(r.bankcard) + '</span></div>';
    if (r.remark)   html += '<div class="record-row"><span class="record-label">\u5907\u6ce8</span><span class="record-val">' + escHtml(r.remark) + '</span></div>';
    html += '<div class="record-time">' + escHtml(r.time) + '</div>';
    html += '<button class="record-restore" onclick="if(requireAdmin())restoreRecord(' + r.id + ')">\u21a9\ufe0f \u6062\u590d</button>';
    html += '<button class="record-delete" onclick="if(requireAdmin())permanentDelete(' + r.id + ')">\ud83d\uddd1\ufe0f \u5f7b\u5e95\u5220\u9664</button>';
    html += '</div>';
  }
  list.innerHTML = html;
}

function restoreRecord(id) {
  var target = trashRecords.filter(function(r){ return r.id === id; })[0];
  if (!target) return;
  trashRecords = trashRecords.filter(function(r){ return r.id !== id; });
  records.unshift(target);
  saveRecords(function(){
    renderRecords();
    renderTrash();
    showToast('\u2705 \u5df2\u6062\u590d');
  });
}

function restoreAll() {
  if (!requireAdmin()) return;
  if (!trashRecords.length) { showToast('\u56de\u6536\u7ad9\u4e3a\u7a7a'); return; }
  showConfirm('\u6062\u590d\u5168\u90e8', '\u786e\u5b9a\u6062\u590d\u5168\u90e8 ' + trashRecords.length + ' \u6761\u8bb0\u5f55\uff1f', function(){
    records = trashRecords.concat(records);
    trashRecords = [];
    saveRecords(function(){
      renderRecords();
      renderTrash();
      showToast('\u2705 \u5df2\u5168\u90e8\u6062\u590d');
    });
  });
}

function permanentDelete(id) {
  if (!requireAdmin()) return;
  trashRecords = trashRecords.filter(function(r){ return r.id !== id; });
  saveRecords(function(){
    renderTrash();
    showToast('\u5df2\u5f7b\u5e95\u5220\u9664');
  });
}

function emptyTrash() {
  if (!requireAdmin()) return;
  if (!trashRecords.length) { showToast('\u56de\u6536\u7ad9\u4e3a\u7a7a'); return; }
  showConfirm('\u6e05\u7a7a\u56de\u6536\u7ad9', '\u786e\u5b9a\u6e05\u7a7a\u56de\u6536\u7ad9\uff1f\u5171 ' + trashRecords.length + ' \u6761\u8bb0\u5f55\u5c06\u88ab\u5f7b\u5e95\u5220\u9664\uff0c\u6b64\u64cd\u4f5c\u4e0d\u53ef\u6062\u590d\uff01', function(){
    trashRecords = [];
    saveRecords(function(){
      renderTrash();
      showToast('\u5df2\u6e05\u7a7a\u56de\u6536\u7ad9');
    });
  });
}

function exportCSV() {
  if (!requireAdmin()) return;
  if (!records.length) { showToast('\u6682\u65E0\u8BB0\u5F55\u53EF\u5BFC\u51FA'); return; }
  var BOM = '\uFEFF';
  var header = '\u5E8F\u53F7,\u59D3\u540D,\u624B\u673A\u53F7,\u8EAB\u4EFD\u8BC1\u53F7,\u5B66\u53F7/\u5DE5\u53F7,\u5DE5\u884C\u5361\u53F7,\u7B80\u5386,\u5907\u6CE8,\u5F55\u5165\u65F6\u95F4\n';
  var rows = [];
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    rows.push((records.length - i) + ',' + csvEscape(r.name) + ',' + csvEscape(r.phone) + ',' + csvEscape(r.idcard) + ',' + csvEscape(r.empno) + ',' + csvEscape(r.bankcard) + ',' + csvEscape(r.resume) + ',' + csvEscape(r.remark) + ',' + csvEscape(r.time));
  }
  var blob = new Blob([BOM + header + rows.join('\n')], { type:'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '\u5165\u5E93\u6570\u636E_' + new Date().toLocaleDateString('zh-CN').replace(/\//g,'-') + '.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('\u2705 CSV \u5DF2\u5BFC\u51FA');
}
function csvEscape(v) {
  if (!v) return '';
  v = String(v);
  if (v.indexOf(',') >= 0 || v.indexOf('"') >= 0 || v.indexOf('\n') >= 0) {
    return '"' + v.replace(/"/g, '""') + '"';
  }
  return v;
}

function copyAll() {
  if (!requireAdmin()) return;
  if (!records.length) { showToast('\u6682\u65E0\u8BB0\u5F55\u53EF\u590D\u5236'); return; }
  var text = [];
  for (var i = 0; i < records.length; i++) {
    var r = records[i];
    var p = ['[' + (records.length - i) + ']'];
    if (r.name)     p.push('\u59D3\u540D: ' + r.name);
    if (r.phone)    p.push('\u624B\u673A: ' + r.phone);
    if (r.idcard)   p.push('\u8EAB\u4EFD\u8BC1: ' + r.idcard);
    if (r.empno)    p.push('\u5B66\u53F7/\u5DE5\u53F7: ' + r.empno);
    if (r.bankcard) p.push('\u5DE5\u884C\u5361: ' + r.bankcard);
    if (r.resume)   p.push('\u7B80\u5386: ' + r.resume);
    if (r.remark)   p.push('\u5907\u6CE8: ' + r.remark);
    p.push('\u65F6\u95F4: ' + r.time);
    text.push(p.join('  |  '));
  }
  navigator.clipboard.writeText(text.join('\n'))
    .then(function(){ showToast('\u2705 \u5DF2\u590D\u5236\u5230\u526A\u8D34\u677F'); })
    .catch(function(){ showToast('\u590D\u5236\u5931\u8D25\uFF0C\u8BF7\u624B\u52A8\u9009\u62E9\u590D\u5236'); });
}
